jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # явно ставим максимум (хотя по умолчанию уже 360)
    
    # ← Добавь concurrency, чтобы не запускалось 100500 ботов одновременно
    concurrency:
      group: tiktok-bot-runner
      cancel-in-progress: false   # false = старый бот продолжает работать до 6 часов

    steps:
    - uses: actions/checkout@v4   # обнови до v4, v3 уже устарел
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        python main.py                # ← УБРАЛИ timeout 300!
