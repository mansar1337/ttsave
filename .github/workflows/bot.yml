name: TikTok Bot Runner

on:
  workflow_dispatch:   # только ручной запуск (можно потом добавить schedule)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # максимум 6 часов
    
    concurrency:
      group: tiktok-bot-runner
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        python main.py          # ← БЕЗ timeout! Работает до 6 часов
