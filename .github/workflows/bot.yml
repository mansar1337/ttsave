name: TikTok Bot Runner

on:
  workflow_dispatch:  # ← только ручной запуск (чтобы бот работал 6 часов без перезапусков)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360          # максимум 6 часов (GitHub сам убьёт после этого)
    
    # Защита от одновременного запуска нескольких ботов
    concurrency:
      group: tiktok-bot-runner
      cancel-in-progress: false

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        python main.py          # ← без timeout! работает до 6 часов
